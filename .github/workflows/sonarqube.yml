name: SonarQube Scan

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  Analysis:
    runs-on: ubuntu-latest

    steps:
      # Checkout the repository
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # Setup Java 17 (required for SonarScanner v2)
      - name: Setup Java 17
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17

      # Run SonarQube analysis
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}   # Provided automatically by GitHub
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}     # Add in repo secrets
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }} # Add in repo secrets
        with:
          args: >
            -Dsonar.projectKey=PatriotArrow_frontend-react
            -Dsonar.organization=patriotarrow
            -Dsonar.sources=.

            
